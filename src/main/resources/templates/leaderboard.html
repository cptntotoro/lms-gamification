<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лидерборд курса</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/leaderboard.css}">
</head>
<body>

<div class="container">
    <h1 class="page-title">Лидерборд курса</h1>

    <!-- Полоска с информацией о курсе -->
    <div class="course-meta">
        <div class="meta-item">
            <span class="meta-label">Курс</span>
            <span class="meta-value" th:text="${courseId}"></span>
        </div>
        <div class="meta-item" th:if="${groupId}">
            <span class="meta-label">Группа</span>
            <span class="meta-value" th:text="${groupId}"></span>
        </div>
        <div class="meta-item" th:unless="${groupId}">
            <span class="meta-label">Группа</span>
            <span class="meta-value">Все группы</span>
        </div>
    </div>

    <div class="leaderboard-wrapper card" th:if="${leaderboard}">

        <div th:if="${leaderboard.topEntries?.isEmpty()}" class="empty-state">
            <div class="empty-icon">🏆</div>
            <p class="empty-text">Пока никто не набрал очков на этом курсе</p>
        </div>

        <div th:unless="${leaderboard.topEntries?.isEmpty()}">
            <div class="table-responsive">
                <table class="leaderboard-table">
                    <thead>
                    <tr>
                        <th class="col-rank text-center" scope="col">Место</th>
                        <th class="col-participant text-center" scope="col">Участник</th>
                        <th class="col-points text-center" scope="col">Очки</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry, iter : ${leaderboard.topEntries}"
                        th:classappend="${entry.rank == leaderboard.currentUserRank} ? 'is-current-user'"
                        th:attr="data-rank=${entry.rank}">

                        <td class="cell-rank text-center">
                            <span th:classappend="|
                                ${iter.index == 0} ? 'medal-gold' :
                                ${iter.index == 1} ? 'medal-silver' :
                                ${iter.index == 2} ? 'medal-bronze' : ''
                            |">
                                <span th:switch="${iter.index}">
                                    <span th:case="0">🥇</span>
                                    <span th:case="1">🥈</span>
                                    <span th:case="2">🥉</span>
                                    <span th:case="*">[[${entry.rank}]]</span>
                                </span>
                            </span>
                        </td>

                        <td class="cell-participant">
                            <div class="participant">
                                <div class="participant-avatar"
                                     th:text="${#strings.substring(entry.userId ?: '??', 0, 2)?.toUpperCase()}"></div>
                                <div class="participant-info">
                                    <div class="participant-name">
                                        <span th:text="${entry.userId ?: '—'}"></span>
                                    </div>
                                    <div class="participant-level" th:if="${entry.globalLevel != null}">
                                        Уровень <strong>[[${entry.globalLevel}]]</strong>
                                    </div>
                                </div>
                            </div>
                        </td>

                        <td class="cell-points">[[${entry.pointsInCourse}]]</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Пагинация -->
            <nav class="pagination" th:if="${leaderboard.totalPages > 1}" aria-label="Пагинация лидерборда">
                <a th:href="@{/me/leaderboard/course/{courseId}/groups/{groupId}(courseId=${courseId},groupId=${groupId},page=${leaderboard.pageNumber - 1},size=${leaderboard.pageSize})}"
                   th:classappend="${!leaderboard.hasPrevious} ? 'disabled'"
                   aria-label="Предыдущая страница"
                   th:unless="${!leaderboard.hasPrevious}">« Предыдущая</a>

                <span th:each="i : ${#numbers.sequence(0, leaderboard.totalPages - 1)}">
                    <a th:href="@{/me/leaderboard/course/{courseId}/groups/{groupId}(courseId=${courseId},groupId=${groupId},page=${i},size=${leaderboard.pageSize})}"
                       th:classappend="${i == leaderboard.pageNumber} ? 'active'"
                       th:text="${i + 1}"
                       aria-label="'Страница ' + ${i + 1}"></a>
                </span>

                <a th:href="@{/me/leaderboard/course/{courseId}/groups/{groupId}(courseId=${courseId},groupId=${groupId},page=${leaderboard.pageNumber + 1},size=${leaderboard.pageSize})}"
                   th:classappend="${!leaderboard.hasNext} ? 'disabled'"
                   aria-label="Следующая страница"
                   th:unless="${!leaderboard.hasNext}">Следующая »</a>
            </nav>
        </div>
    </div>

    <div class="error-message" th:if="${leaderboard == null}">
        Не удалось загрузить лидерборд
    </div>
</div>

</body>
</html>
